info:
  name: Etymology Chain
  type: http
  seq: 3

http:
  method: GET
  url: "{{host}}/api/etymology/{{word}}/chain?lang={{lang}}&max_depth={{max_depth}}"
  params:
    - name: lang
      value: "{{lang}}"
      type: query
    - name: max_depth
      value: "{{max_depth}}"
      type: query
  auth: inherit

runtime:
  variables:
    - name: word
      value: cheese
    - name: lang
      value: English
    - name: max_depth
      value: "10"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
