info:
  name: Search
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/api/search?q={{q}}&limit={{limit}}"
  params:
    - name: q
      value: "{{q}}"
      type: query
    - name: limit
      value: "{{limit}}"
      type: query
  auth: inherit

runtime:
  variables:
    - name: q
      value: apple
    - name: limit
      value: "20"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
