info:
  name: Etymology Tree
  type: http
  seq: 4

http:
  method: GET
  url: "{{host}}/api/etymology/{{word}}/tree?lang={{lang}}&types={{types}}&max_ancestor_depth={{max_ancestor_depth}}&max_descendant_depth={{max_descendant_depth}}"
  params:
    - name: lang
      value: "{{lang}}"
      type: query
    - name: types
      value: "{{types}}"
      type: query
    - name: max_ancestor_depth
      value: "{{max_ancestor_depth}}"
      type: query
    - name: max_descendant_depth
      value: "{{max_descendant_depth}}"
      type: query
  auth: inherit

runtime:
  variables:
    - name: word
      value: cheese
    - name: lang
      value: English
    - name: types
      value: inh,bor
    - name: max_ancestor_depth
      value: "10"
    - name: max_descendant_depth
      value: "3"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
