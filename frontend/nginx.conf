server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;

        # SSE support (SPC-00021): keep the upstream connection HTTP/1.1 and
        # unbuffered so layout-stream frames reach the client incrementally.
        # Buffering stays ON for normal endpoints — the backend opts a single
        # response out per-request via `X-Accel-Buffering: no`.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://backend:8000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
